{% extends 'bookings/base.html' %} {% block title %}Admin Login — TurfZone
{%endblock %} {% block content %}
<div
  style="
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  "
>
  <div style="width: 100%; max-width: 400px">
    <div class="card">
      <div class="card-header" style="text-align: center">
        <h2>🔒 Admin Login</h2>
      </div>
      <div class="card-body">
        {% if messages %}{% for message in messages %}
        <div class="alert alert-error">{{ message }}</div>
        {% endfor %}{% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="form-group">
            <label>Username</label
            ><input
              type="text"
              name="username"
              class="form-control"
              placeholder="Admin username"
              required
              autofocus
            />
          </div>
          <div class="form-group">
            <label>Password</label
            ><input
              type="password"
              name="password"
              class="form-control"
              placeholder="Password"
              required
            />
          </div>
          <button
            type="submit"
            class="btn btn-primary btn-lg btn-block"
            style="margin-top: 0.5rem"
          >
            Login to Dashboard
          </button>
        </form>
      </div>
    </div>
    <p style="text-align: center; margin-top: 1rem; font-size: 0.85rem">
      <a href="/" style="color: var(--green)">← Back to Booking</a>
    </p>
  </div>
</div>
{% endblock %}
